<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ambrand Studio - Access</title>
    <link rel="icon" type="image/png" href="images/site-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Stara:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #5227FF;
            --accent: #E31937;
            --bg: #030303;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
            --text-dim: #9a9897;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Stara', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Glows */
        .glow {
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
            opacity: 0.3;
        }

        .glow-1 {
            top: -100px;
            left: -100px;
            background: var(--primary);
        }

        .glow-2 {
            bottom: -100px;
            right: -100px;
            background: var(--accent);
        }

        .auth-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            perspective: 1000px;
        }

        .auth-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            transition: transform 0.6s ease;
            position: relative;
        }

        .logo {
            width: 120px;
            margin-bottom: 30px;
        }

        h2 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        p.subtitle {
            color: var(--text-dim);
            font-size: 14px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            margin-bottom: 8px;
            margin-left: 4px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            font-size: 14px;
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 14px 14px 14px 44px;
            color: var(--text);
            font-family: inherit;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 0 4px rgba(82, 39, 255, 0.1);
        }

        .btn-submit {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-submit:hover {
            background: #4119ff;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(82, 39, 255, 0.4);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .btn-submit.loading {
            opacity: 0.7;
            pointer-events: none;
        }

        .auth-footer {
            margin-top: 24px;
            font-size: 14px;
            color: var(--text-dim);
        }

        .auth-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .error-message {
            background: rgba(227, 25, 55, 0.1);
            border: 1px solid rgba(227, 25, 55, 0.2);
            color: var(--accent);
            padding: 12px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
        }

        /* Roles Switcher (Only for Signup) */
        .role-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .role-option {
            flex: 1;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            color: var(--text-dim);
        }

        .role-option.active {
            background: rgba(82, 39, 255, 0.1);
            border-color: var(--primary);
            color: var(--primary);
        }

        .hidden {
            display: none;
        }

        /* Back to site */
        .back-link {
            position: absolute;
            top: 30px;
            left: 30px;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: var(--text);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-card {
            animation: fadeIn 0.8s ease forwards;
        }
    </style>
</head>
<body>
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>

    <a href="index.html" class="back-link">
        <i class="fas fa-arrow-left"></i> Back to Website
    </a>

    <div class="auth-container">
        <!-- LOGIN CARD -->
        <div class="auth-card" id="loginCard">
            <img src="images/navbar-logo.png" alt="Ambrand" class="logo">
            <h2 id="authTitle">Welcome Back</h2>
            <p class="subtitle" id="authSubtitle">Enter your credentials to access your account</p>

            <div id="errorBox" class="error-message"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="loginEmail" placeholder="name@example.com" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="loginPassword" placeholder="••••••••" required>
                    </div>
                </div>
                <button type="submit" class="btn-submit">
                    <span>Sign In</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="#" id="toggleToSignup">Sign Up</a>
            </div>
        </div>

        <!-- SIGNUP CARD -->
        <div class="auth-card hidden" id="signupCard">
            <img src="images/navbar-logo.png" alt="Ambrand" class="logo">
            <h2>Create Account</h2>
            <p class="subtitle">Join Ambrand Studio today</p>

            <div id="signupErrorBox" class="error-message"></div>

            <form id="signupForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="signupName" placeholder="John Doe" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="signupEmail" placeholder="name@example.com" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="signupPassword" placeholder="••••••••" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>I am a...</label>
                    <div class="role-selector">
                        <div class="role-option active" data-role="user">Client / User</div>
                        <div class="role-option" data-role="provider">Provider / Admin</div>
                    </div>
                </div>

                <button type="submit" class="btn-submit">
                    <span>Get Started</span>
                    <i class="fas fa-rocket"></i>
                </button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="#" id="toggleToLogin">Sign In</a>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginCard = document.getElementById('loginCard');
            const signupCard = document.getElementById('signupCard');
            const toggleToSignup = document.getElementById('toggleToSignup');
            const toggleToLogin = document.getElementById('toggleToLogin');
            
            const loginForm = document.getElementById('loginForm');
            const signupForm = document.getElementById('signupForm');
            const errorBox = document.getElementById('errorBox');
            const signupErrorBox = document.getElementById('signupErrorBox');

            // Switch between Login and Signup
            toggleToSignup.addEventListener('click', (e) => {
                e.preventDefault();
                loginCard.classList.add('hidden');
                signupCard.classList.remove('hidden');
            });

            toggleToLogin.addEventListener('click', (e) => {
                e.preventDefault();
                signupCard.classList.add('hidden');
                loginCard.classList.remove('hidden');
            });

            // Role Selection
            let selectedRole = 'user';
            const roleOptions = document.querySelectorAll('.role-option');
            roleOptions.forEach(opt => {
                opt.addEventListener('click', () => {
                    roleOptions.forEach(o => o.classList.remove('active'));
                    opt.classList.add('active');
                    selectedRole = opt.getAttribute('data-role');
                });
            });

            // Handle Login
            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('loginEmail').value;
                const password = document.getElementById('loginPassword').value;
                const btn = loginForm.querySelector('.btn-submit');
                
                btn.classList.add('loading');
                btn.querySelector('span').textContent = 'Authenticating...';
                errorBox.style.display = 'none';

                const result = await signIn(email, password);
                
                if (result.success) {
                    // Redirect based on role
                    if (result.profile.role === 'provider') {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'index.html';
                    }
                } else {
                    errorBox.textContent = result.error;
                    errorBox.style.display = 'block';
                    btn.classList.remove('loading');
                    btn.querySelector('span').textContent = 'Sign In';
                }
            });

            // Handle Signup
            signupForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const name = document.getElementById('signupName').value;
                const email = document.getElementById('signupEmail').value;
                const password = document.getElementById('signupPassword').value;
                const btn = signupForm.querySelector('.btn-submit');

                btn.classList.add('loading');
                btn.querySelector('span').textContent = 'Creating Account...';
                signupErrorBox.style.display = 'none';

                const result = await signUp(email, password, name, selectedRole);

                if (result.success) {
                    alert('Account created successfully! Please check your email for confirmation (if enabled). You can now sign in.');
                    toggleToLogin.click();
                } else {
                    signupErrorBox.textContent = result.error;
                    signupErrorBox.style.display = 'block';
                }
                
                btn.classList.remove('loading');
                btn.querySelector('span').textContent = 'Get Started';
            });
        });
    </script>
</body>
</html>
